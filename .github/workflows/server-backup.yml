name: Server Backup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment name
        required: true
        default: production
        type: string

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          if [[ -z "$DEPLOY_HOST" || -z "$DEPLOY_USER" || -z "$DEPLOY_SSH_KEY" ]]; then
            echo "DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY must be set in GitHub environment secrets."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Trigger backup on server
        id: backup
        shell: bash
        run: |
          PORT="${DEPLOY_PORT:-22}"
          TARGET_PATH="${DEPLOY_PATH:-/srv/lamb-pilot}"
          LATEST_BACKUP="$(
            ssh -p "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "
              cd '${TARGET_PATH}/current' &&
              npm run backup >/dev/null &&
              find '${TARGET_PATH}/shared/backups' -maxdepth 1 -type f -name 'emotion-tracker-*.db' ! -name '*-wal' ! -name '*-shm' | sort | tail -n 1
            "
          )"

          if [[ -z "$LATEST_BACKUP" ]]; then
            echo "No backup file was returned by the server."
            exit 1
          fi

          echo "latest_backup=$LATEST_BACKUP" >> "$GITHUB_OUTPUT"
          echo "backup_name=$(basename "$LATEST_BACKUP")" >> "$GITHUB_OUTPUT"

      - name: Download backup artifact
        shell: bash
        run: |
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p tmp/server-backups
          BASE_PATH="${{ steps.backup.outputs.latest_backup }}"
          scp -P "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}:${BASE_PATH}" "tmp/server-backups/${{ steps.backup.outputs.backup_name }}"

          if ssh -p "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "test -f '${BASE_PATH}-wal'"; then
            scp -P "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}:${BASE_PATH}-wal" "tmp/server-backups/${{ steps.backup.outputs.backup_name }}-wal"
          fi

          if ssh -p "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "test -f '${BASE_PATH}-shm'"; then
            scp -P "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}:${BASE_PATH}-shm" "tmp/server-backups/${{ steps.backup.outputs.backup_name }}-shm"
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-backup-${{ steps.backup.outputs.backup_name }}
          path: tmp/server-backups/*
          retention-days: 14
